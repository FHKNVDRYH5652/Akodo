<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIKEY SERVER v3.3</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:      #00c8f0;
      --cyan-dim:  rgba(0, 200, 240, 0.25);
      --cyan-glow: rgba(0, 200, 240, 0.55);
      --navy:      #040d1c;
      --navy-2:    #060f22;
      --navy-3:    #08142e;
      --navy-card: #071020;
      --input-bg:  #0a1528;
      --device-bg: #0c1a30;
      --border:    rgba(0, 200, 240, 0.28);
      --border-hi: rgba(0, 200, 240, 0.55);
      --text:      #ffffff;
      --text-sub:  #8aa0bb;
      --text-dim:  #4a6280;
      --green:     #00e676;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* ─── STARS BACKGROUND ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,90,160,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,50,120,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── WRAPPER ───────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAVBAR ────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 58px;
      background: rgba(4, 13, 28, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,200,240,0.10);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 8px rgba(0,200,240,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--cyan);
      background: rgba(0,200,240,0.06);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 8px rgba(0,200,240,0.15); }
      50%      { box-shadow: 0 0 22px var(--cyan-glow), inset 0 0 14px rgba(0,200,240,0.25); }
    }

    .nav-title {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 2px;
      color: #fff;
    }

    .nav-badge {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--cyan);
      border: 1px solid var(--border-hi);
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(0,200,240,0.06);
      letter-spacing: 1px;
    }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-sub);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    .status-online { color: var(--green); }

    /* ─── HERO / VIDEO SECTION ──────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 52vh;
      min-height: 320px;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Gradient overlay — fades to dark at bottom */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(4,13,28,0.08)  0%,
        rgba(4,13,28,0.10)  40%,
        rgba(4,13,28,0.55)  70%,
        rgba(4,13,28,0.90)  85%,
        rgba(4,13,28,1.00) 100%
      );
    }

    /* ─── CIRCULAR AVATAR ─────────────────────────────── */
    .avatar-wrap {
      position: absolute;
      left: 50%;
      bottom: -2px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .avatar-ring {
      position: relative;
      width: 150px;
      height: 150px;
    }

    /* Rotating outer ring */
    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--cyan);
      border-right-color: var(--cyan);
      animation: spin 4s linear infinite;
      filter: drop-shadow(0 0 8px var(--cyan));
    }

    /* Static glow ring */
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(0,200,240,0.45);
      box-shadow:
        0 0 20px rgba(0,200,240,0.4),
        inset 0 0 20px rgba(0,200,240,0.08);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Diamond dots at cardinal points */
    .ring-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--cyan);
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-glow);
      border-radius: 2px;
      z-index: 2;
    }
    .ring-dot.top    { top: -5px;   left: 50%; transform: translateX(-50%) rotate(45deg); }
    .ring-dot.bottom { bottom: -5px; left: 50%; transform: translateX(-50%) rotate(45deg); }
    .ring-dot.left   { left: -5px;  top: 50%;  transform: translateY(-50%) rotate(45deg); }
    .ring-dot.right  { right: -5px; top: 50%;  transform: translateY(-50%) rotate(45deg); }

    /* ─── MAIN CONTENT ──────────────────────────────────── */
    .content {
      padding: 0 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── BIG TITLE ─────────────────────────────────────── */
    .main-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(38px, 8vw, 64px);
      letter-spacing: 4px;
      color: #fff;
      text-align: center;
      margin-top: 18px;
      line-height: 1;
      text-shadow:
        0 0 30px rgba(0,200,240,0.3),
        0 2px 4px rgba(0,0,0,0.8);
    }

    .version-pill {
      margin-top: 12px;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 5px 18px;
      background: rgba(255,255,255,0.05);
    }

    .license-pill {
      margin-top: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--cyan);
      border: 1.5px solid var(--border-hi);
      border-radius: 30px;
      padding: 7px 26px;
      background: rgba(0,200,240,0.05);
      box-shadow: 0 0 14px rgba(0,200,240,0.10);
    }

    /* ─── FORM ──────────────────────────────────────────── */
    .form-section {
      width: 100%;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-group { display: flex; flex-direction: column; gap: 8px; }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--text);
    }

    .field-label svg { color: var(--cyan); flex-shrink: 0; }

    .field-input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      letter-spacing: 0.5px;
    }

    .field-input::placeholder { color: rgba(255,255,255,0.25); }

    .field-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,200,240,0.12), 0 0 12px rgba(0,200,240,0.10);
    }

    .field-input.device-id {
      background: var(--device-bg);
      color: #a8c8e0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      letter-spacing: 1px;
    }

    /* ─── BUTTON ROW ────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .btn-login {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(90deg, #0a4a8c 0%, #0099cc 50%, #00c8f0 100%);
      border: none;
      border-radius: 10px;
      padding: 16px 24px;
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 24px rgba(0,150,200,0.35), 0 0 0 1px rgba(0,200,240,0.2);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-login:hover::before { transform: translateX(100%); }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 32px rgba(0,180,220,0.5); }
    .btn-login:active { transform: translateY(0); }

    .btn-refresh {
      width: 56px;
      height: auto;
      background: #0c1a30;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-sub);
      font-size: 18px;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .btn-refresh:hover { border-color: var(--cyan); color: var(--cyan); transform: rotate(90deg); }

    /* ─── LICENSE INFO BOX ──────────────────────────────── */
    .license-box {
      width: 100%;
      margin-top: 4px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: rgba(0,200,240,0.03);
      overflow: hidden;
    }

    .license-box-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
    }

    .license-box-header span {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--cyan);
    }

    .license-box-body {
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .license-box-footer {
      margin: 0 18px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-ready {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #c8dff0;
    }

    .ready-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }

    .device-id-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* ─── FOOTER ────────────────────────────────────────── */
    .footer {
      margin-top: 32px;
      padding-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .footer-copy {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-align: center;
    }

    .footer-icons {
      display: flex;
      gap: 12px;
    }

    .footer-icon {
      width: 44px;
      height: 44px;
      background: #0c1a30;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-sub);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .footer-icon:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,200,240,0.2);
    }

    /* ─── PARTICLE DOTS (ambient) ───────────────────────── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0;
      animation: floatUp var(--dur) ease-in infinite var(--delay);
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: var(--op); }
      90%  { opacity: var(--op); }
      100% { opacity: 0; transform: translateY(-60vh) scale(0.3); }
    }

    /* ─── SCROLLBAR ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 500px) {
      .main-title { font-size: 32px; }
      .license-pill { font-size: 11px; letter-spacing: 2px; padding: 6px 18px; }
      nav { padding: 0 16px; }
      .content { padding: 0 16px 24px; }
    }
  </style>
</head>
<body>

<!-- Ambient particles -->
<div class="particles" id="particles"></div>

<div class="page">

  <!-- ── NAVBAR ── -->
  <nav>
    <div class="nav-left">
      <div class="nav-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a5 5 0 0 1 5 5c0 5.25-5 10-5 10S7 12.25 7 7a5 5 0 0 1 5-5z"/>
          <circle cx="12" cy="7" r="2"/>
          <path d="M12 17c-4 0-7 1.5-7 3v1h14v-1c0-1.5-3-3-7-3z"/>
        </svg>
      </div>
      <span class="nav-title">MIKEY SERVER</span>
      <span class="nav-badge">v3.3</span>
    </div>
    <div class="nav-status">
      <div class="status-dot"></div>
      SERVER STATUS&nbsp;<span class="status-online">ONLINE</span>
    </div>
  </nav>

  <!-- ── HERO VIDEO SECTION ── -->
  <div class="hero">
    <video class="hero-video" id="heroVideo" src="501.mp4" loop playsinline preload="auto"></video>
    <div class="hero-overlay"></div>

    <!-- Circular avatar at bottom-center of hero -->
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="ring-dot top"></div>
        <div class="ring-dot bottom"></div>
        <div class="ring-dot left"></div>
        <div class="ring-dot right"></div>
        <img class="avatar-img" src="502.png" alt="Mikey" />
      </div>
    </div>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div class="content">

    <h1 class="main-title">MIKEY SERVER</h1>
    <div class="version-pill">VERSION 3.3</div>
    <div class="license-pill">PREMIUM SINGLE DEVICE LICENSE</div>

    <!-- ── FORM ── -->
    <div class="form-section">

      <!-- License Key -->
      <div class="field-group">
        <label class="field-label">
          <!-- Key icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7.5" cy="15.5" r="5.5"/>
            <path d="m21 2-9.6 9.6"/>
            <path d="m15.5 7.5 3 3L22 7l-3-3"/>
          </svg>
          LICENSE KEY
        </label>
        <input class="field-input" type="text" id="licenseKey" placeholder="Enter your license key" autocomplete="off" />
      </div>

      <!-- Device ID -->
      <div class="field-group">
        <label class="field-label">
          <!-- Monitor icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
          DEVICE ID
        </label>
        <input class="field-input device-id" type="text" id="deviceId" value="FS-117W-1WII" readonly />
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn-login" onclick="handleLogin()">
          <!-- Arrow-right icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          LOGIN
        </button>
        <button class="btn-refresh" onclick="refreshDeviceId()" title="Refresh Device ID">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
          </svg>
        </button>
      </div>

      <!-- License Info Box -->
      <div class="license-box">
        <div class="license-box-header">
          <!-- Info icon -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
          <span>LICENSE INFORMATION</span>
        </div>
        <div class="license-box-body">
          Single device license. Device ID registered upon first activation.
        </div>
        <div class="license-box-footer">
          <div class="status-ready">
            <div class="ready-dot"></div>
            Device Status: Ready
          </div>
          <div class="device-id-display" id="footerDeviceId">FS-117W-1WII</div>
        </div>
      </div>

    </div><!-- /form-section -->

    <!-- ── FOOTER ── -->
    <div class="footer">
      <div class="footer-copy">© 2026 MIKEY SERVER &nbsp;|&nbsp; QUANTUM TRADING TECHNOLOGY</div>
      <div class="footer-icons">
        <!-- Discord -->

<script>
  /* ── AUDIO+VIDEO TRIGGER — CHROME COMPATIBLE ── */
  // Chrome sirf touchstart/click ko valid user gesture maanta hai audio ke liye
  // scroll/touchmove se audio unlock NAHI hota
  let videoTriggered = false;

  function triggerVideo() {
    if (videoTriggered) return;
    videoTriggered = true;

    const vid = document.getElementById('heroVideo');
    vid.muted = false;
    vid.volume = 0.85;
    vid.currentTime = 0;

    vid.play().catch(() => {
      // Fallback: muted se play karo
      vid.muted = true;
      vid.play().catch(() => {});
    });

    document.removeEventListener('touchstart', triggerVideo);
    document.removeEventListener('click',      triggerVideo);
  }

  window.addEventListener('DOMContentLoaded', () => {
    const vid = document.getElementById('heroVideo');

    // Silent muted autoplay — video buffer hone do
    vid.muted = true;
    vid.play().catch(() => {});

    // Pehle touch ya click pe audio unlock hoga
    document.addEventListener('touchstart', triggerVideo, { passive: true, once: true });
    document.addEventListener('click',      triggerVideo, { once: true });
  });

  /* ── PARTICLE GENERATOR ── */
  (function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        bottom:${Math.random()*30}%;
        --dur:${Math.random()*12+8}s;
        --delay:${Math.random()*10}s;
        --op:${Math.random()*0.4+0.1};
      `;
      container.appendChild(p);
    }
  })();

  /* ── DEVICE ID GENERATOR ── */
  function genDeviceId() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const rand = (n) => Array.from({length:n}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    return `${rand(2)}-${rand(4)}${rand(1)}-${rand(4)}`;
  }

  function refreshDeviceId() {
    const id = genDeviceId();
    document.getElementById('deviceId').value = id;
    document.getElementById('footerDeviceId').textContent = id;
    const btn = document.querySelector('.btn-refresh svg');
    btn.style.transition = 'transform 0.5s';
    btn.style.transform = 'rotate(360deg)';
    setTimeout(() => { btn.style.transition = ''; btn.style.transform = ''; }, 500);
  }

  /* ── LOGIN HANDLER ── */
  function handleLogin() {
    const key = document.getElementById('licenseKey').value.trim();
    if (!key) {
      shake(document.getElementById('licenseKey'));
      return;
    }
    const btn = document.querySelector('.btn-login');
    btn.textContent = '● VERIFYING...';
    btn.style.background = 'linear-gradient(90deg,#0a2a4c,#005577)';
    setTimeout(() => {
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        LOGIN`;
      btn.style.background = 'linear-gradient(90deg, #0a4a8c 0%, #0099cc 50%, #00c8f0 100%)';
    }, 2500);
  }

  function shake(el) {
    el.style.animation = 'none';
    el.style.borderColor = '#ff4466';
    el.style.boxShadow = '0 0 0 3px rgba(255,50,80,0.18)';
    el.animate([
      {transform:'translateX(0)'},
      {transform:'translateX(-8px)'},
      {transform:'translateX(8px)'},
      {transform:'translateX(-6px)'},
      {transform:'translateX(6px)'},
      {transform:'translateX(0)'}
    ], {duration:400, easing:'ease-in-out'}).onfinish = () => {
      el.style.borderColor = '';
      el.style.boxShadow = '';
    };
  }
</script>
